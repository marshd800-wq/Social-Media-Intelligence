real estate, you've felt it. Interest rate momentum, buyer psychology, inventory levels - they're all recalibrating right now.\n\nWhat does this mean for you?\n\nIf you're selling: This is the window. Luxury buyers are making moves before Q1 closes, and serious sellers are capitalizing on that urgency.\n\nIf you're buying: Competition has loosened compared to last quarter, but the homes worth owning are still moving fast. Positioning matters.\n\nIf you're investing: The metric that matters most has changed. It's not just appreciation anymore.\n\nI'm breaking down exactly where the opportunities are in today's market - neighborhood by neighborhood, price point by price point. No fluff, just data.\n\nReady to know where you actually stand?\n\n#LuxuryRealEstate #MetroAtlanta #MarketInsights #RealEstateStrategy #BerkshireHathawayHomeServices", "p": "Instagram", "s": 79.5, "t": "TOP TIER", "th": "Market stats / education", "ob": false, "tr": "", "nm": "E | Pull approved content from queue"}, {"h": "The $1M+ Atlanta luxury market just shifted. Here's what changed.", "c": "The $1M+ Atlanta luxury market just shifted. Here's what changed.\n\nIf you're watching the metro Atlanta luxury market, you've felt it: buyer behavior is different than last year. Serious shifts in what moves inventory and what sits.\n\nThree things I'm seeing right now:\n\n1. Location premium is REAL. Established neighborhoods with strong school districts and walkability are commanding full asking. Newer developments without the legacy appeal? Sitting longer.\n\n2. Buyer psychology changed. Gone are the days of bidding wars on every listing. Today's luxury buyer is selective, educated, and moving on homes that don't justify the price.\n\n3. Financing matters more than ever. Cash and strong pre-approval letters get showings scheduled faster. Contingent offers? They're evaluated differently now.\n\nThe luxury market rewards clarity: clear value, clear location benefits, clear financial positioning.\n\nIf you're thinking about buying, selling, or just understanding where your Atlanta property sits in this market, that's where expertise makes the difference.\n\nLet's talk about what this means for your goals.", "p": "Instagram", "s": 76.9, "t": "TOP TIER", "th": "Buyer / first-time / financing", "ob": false, "tr": "", "nm": "E | Format for Instagram and ManyChat"}, {"h": "The luxury market just shifted. Here's what that means for you.", "c": "The luxury market just shifted. Here's what that means for you.\n\nIf you've been watching Atlanta's high-end real estate, you've felt it. Interest rates, buyer psychology, inventory levels - they're all recalibrating right now.\n\nWhat does this mean in practical terms?\n\nFor sellers: Your timeline matters more than ever. Homes priced right and positioned well are moving. Homes sitting? They're sitting harder.\n\nFor buyers: You actually have options again. The days of bidding wars on everything are cooling. That means strategy - and expertise - matter tremendously.\n\nFor investors: We're seeing a reset that creates opportunity for those who understand the market fundamentals.\n\nHere's what I'm telling my clients: This isn't a time to wait and see. It's a time to get clear on YOUR goals, because the market rewards intentionality right now.\n\nWhat's your move? Let's talk strategy.\n\n#AtlantaLuxuryRealEstate #MetroAtlantaMarket #LuxuryHomesForSale #RealEstateInsights #AtlantaREALTOR", "p": "Instagram", "s": 73.5, "t": "TOP TIER", "th": "Market stats / education", "ob": false, "tr": "", "nm": "E | Pull approved content from queue"}, {"h": "The luxury market just shifted. Here's what sellers need to know.", "c": "The luxury market just shifted. Here's what sellers need to know.\n\nIf you're thinking about selling your Metro Atlanta home in 2025, timing matters more than ever. The high-end market has cooled from last year's frenzy, which actually works in your favor right now.\n\nHere's why: Serious buyers are back. The tire-kickers have left. When fewer homes are on the market, yours gets premium attention from qualified purchasers who are ready to move.\n\nWhat this means for your pricing strategy:\n• Overpricing kills momentum faster than ever\n• Professional staging and photography are non-negotiable\n• Your home's story matters. Luxury buyers want lifestyle, not just square footage\n\nThe agents who thrive in this market? They know their neighborhoods intimately, they price strategically, and they market differently than everyone else.\n\nReady to position your home for success? Let's talk about your specific situation. Every property has a perfect buyer waiting.", "p": "Instagram", "s": 69.6, "t": "STRONG", "th": "Seller / move-up equity", "ob": false, "tr": "", "nm": "E | Format for Instagram and ManyChat"}, {"h": "Your Atlanta home is worth more than you think.", "c": "Your Atlanta home is worth more than you think.\n\nHere's what's shifting in our metro luxury market right now: homes in established neighborhoods like Buckhead, Druid Hills, and East Atlanta are commanding stronger prices because buyers want character, walkability, and community. New construction? Still moving, but the heat is cooling slightly, which means smart sellers are positioning NOW.\n\nIf you've been wondering whether it's time to list, the answer depends on three things:\n\n1. Your timeline (urgency matters)\n2. Your neighborhood trajectory (some areas outpace others)\n3. Market conditions specific to YOUR price point\n\nAs a REALTOR® working Metro Atlanta's luxury segment, I see these patterns before they hit the news. The agents who win are the ones educating their clients early.\n\nReady to know what YOUR home is actually worth in today's market? Let's talk strategy.\n\n#AtlantaRealEstate #LuxuryHomes #MetroAtlanta #RealEstateInsights #BuckheadHomes", "p": "Instagram", "s": 64.6, "t": "STRONG", "th": "Seller / move-up equity", "ob": false, "tr": "", "nm": "E | Format for Instagram and ManyChat"}, {"h": "What luxury buyers are actually looking for in 2025.", "c": "What luxury buyers are actually looking for in 2025.\n\nI'm seeing a clear shift in the metro Atlanta luxury market. It's not just about square footage anymore. Today's high-net-worth buyers want intentional spaces: home offices that feel like private sanctuaries, wellness amenities that matter, and neighborhoods with real community.\n\nThey're also prioritizing location over size. A 6,000 sq ft home in a secondary market? Pass. A 4,500 sq ft home in Buckhead, Druid Hills, or Virginia Highland? Now we're talking.\n\nOne more thing: authenticity wins. Buyers can sense when a home has been lived in with intention versus staged for the photo. Real architectural bones, quality finishes that will last, and genuine lifestyle appeal close deals faster.\n\nIf you're thinking about selling in this market, these insights matter. The buyers are selective, informed, and ready to move on the right property.\n\nWhat questions do you have about positioning your home? Let's talk.\n\n#LuxuryRealEstate #AtlantaHomes #BuckheadLiving #RealEstateInsights #MetroAtlanta", "p": "Instagram", "s": 63.6, "t": "STRONG", "th": "Seller / move-up equity", "ob": false, "tr": "", "nm": "E | Dispatched directly to Maya — Notes: So far the co"}, {"h": "Your closing costs don't have to be a surprise.", "c": "Your closing costs don't have to be a surprise. One of the biggest questions I get from buyers in metro Atlanta is: what am I actually paying at closing? Let's break it down so you walk in informed.\n\nClosing costs typically run 2-5% of your purchase price and include lender fees, title insurance, appraisal, inspections, and attorney fees. In Georgia, the REALTOR® commission is negotiable, not fixed. Your loan officer will provide a Closing Disclosure at least 3 days before closing so there are zero surprises.\n\nPro tip: Ask your listing agent or REALTOR® about seller concessions. Sometimes sellers will cover a portion of closing costs to make the deal work. It's always worth the conversation.\n\nThe luxury market moves differently. Let's talk about your specific numbers.", "p": "Instagram", "s": 62.6, "t": "STRONG", "th": "Seller / move-up equity", "ob": false, "tr": "", "nm": "E | Pull approved content from queue"}, {"h": "I didn't start here. I started everywhere else.", "c": "I didn't start here. I started everywhere else.\n\nTwelve years as a Delta flight attendant taught me what matters: trust, consistency, and showing up for people when it counts. I learned luxury from 30,000 feet. I learned people from every corner of the world.\n\nWhen I transitioned to real estate, I brought that same philosophy. I'm not here to sell houses. I'm here to guide families into homes that fit their lives, their dreams, and their future.\n\nI specialize in Metro Atlanta's luxury market because I understand the client who's traveled, who knows quality, who expects excellence. Whether you're buying, selling, or investing, I bring clarity to a process that feels overwhelming.\n\nAs a REALTOR® and Forever Agent® at Berkshire Hathaway HomeServices Georgia Properties, I promise one thing: you'll never feel like a transaction. You'll feel like family.\n\nLet's talk about what's next.\n\n#ATLLuxuryRealEstate #MetroAtlantaHomes #REALTOR #BerkshireHathawayHomeServices #ForeverAgent", "p": "Instagram", "s": 58.6, "t": "STRONG", "th": "Seller / move-up equity", "ob": true, "tr": "", "nm": "P | Content draft — Diana's origin story — a pinned 'S (Redraft)"}]</script>

:root{
  /* Luxury With a Pulse — warm earth palette (locked brand guide) */
  --bg:#f5f0e8; --panel:#fffdf9; --panel-2:#faf5ec; --inset:#ece2d2;
  --ink:#2c1f14; --ink-2:#6e5d49; --muted:#9c8b76; --line:#e7ddcc;
  --accent:#a8562e; --accent-strong:#8a4423; --accent-soft:#f3e6db;
  --reel:#a8562e; --carousel:#8a5a2b; --static:#c4a882;
  --good:#a8562e; --warn:#8a5a2b; --crit:#6b1f2a;
  --good-soft:#f3e6db; --warn-soft:#efe6d3; --crit-soft:#f0e0dd;
  --gold:#b8935a;
  --shadow:0 1px 2px rgba(44,31,20,.05),0 10px 26px -12px rgba(44,31,20,.18);
  --r:14px; --r-sm:10px;
  --sans:'Inter',ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --serif:'Playfair Display',Georgia,'Times New Roman',serif;
  --script:'Parisienne',"Segoe Script",cursive;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#191108; --panel:#241a11; --panel-2:#2a1f14; --inset:#31251a;
  --ink:#f5f0e8; --ink-2:#cabca6; --muted:#96866f; --line:#3a2b1c;
  --accent:#cc6f42; --accent-strong:#dd8757; --accent-soft:#2c2014;
  --reel:#cc6f42; --carousel:#b98944; --static:#c9ad84;
  --good:#cc6f42; --warn:#b98944; --crit:#c85a54;
  --good-soft:#2c2014; --warn-soft:#2a2113; --crit-soft:#2e1714;
  --gold:#c6a267;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 12px 30px -14px rgba(0,0,0,.65);
}}
:root[data-theme="light"]{
  --bg:#f5f0e8; --panel:#fffdf9; --panel-2:#faf5ec; --inset:#ece2d2;
  --ink:#2c1f14; --ink-2:#6e5d49; --muted:#9c8b76; --line:#e7ddcc;
  --accent:#a8562e; --accent-strong:#8a4423; --accent-soft:#f3e6db;
  --reel:#a8562e; --carousel:#8a5a2b; --static:#c4a882;
  --good:#a8562e; --warn:#8a5a2b; --crit:#6b1f2a;
  --good-soft:#f3e6db; --warn-soft:#efe6d3; --crit-soft:#f0e0dd;
  --gold:#b8935a;
  --shadow:0 1px 2px rgba(44,31,20,.05),0 10px 26px -12px rgba(44,31,20,.18);
}
:root[data-theme="dark"]{
  --bg:#191108; --panel:#241a11; --panel-2:#2a1f14; --inset:#31251a;
  --ink:#f5f0e8; --ink-2:#cabca6; --muted:#96866f; --line:#3a2b1c;
  --accent:#cc6f42; --accent-strong:#dd8757; --accent-soft:#2c2014;
  --reel:#cc6f42; --carousel:#b98944; --static:#c9ad84;
  --good:#cc6f42; --warn:#b98944; --crit:#c85a54;
  --good-soft:#2c2014; --warn-soft:#2a2113; --crit-soft:#2e1714;
  --gold:#c6a267;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 12px 30px -14px rgba(0,0,0,.65);
}
/* Brand typography: Playfair for display, Inter for data/body */
.top h1{font-family:var(--serif);font-weight:700;font-size:21px}
.card h3{font-family:var(--serif);font-weight:700}
.brand b{font-family:var(--serif);font-weight:700;font-size:16px}
.brand .tagline{font-family:var(--script);color:var(--accent);font-size:15px;line-height:1.1;display:block;margin-top:2px}
.gauge .val,.stat .big,.bar .bv,.num,.score-badge{font-family:var(--sans)}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;}
a{color:inherit}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

/* Shell */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;gap:6px;padding:20px 14px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
.brand .mark{width:32px;height:32px;border-radius:9px;flex:0 0 auto;
  background:linear-gradient(150deg,var(--accent),var(--accent-strong));
  display:grid;place-items:center;box-shadow:0 4px 10px -4px var(--accent)}
.brand .mark svg{width:18px;height:18px}
.brand b{font-size:14.5px;letter-spacing:-.01em;display:block;line-height:1.15}
.brand span{font-size:11px;color:var(--muted);letter-spacing:.03em}
.nav{display:flex;flex-direction:column;gap:2px}
.navlabel{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);padding:12px 10px 6px}
.nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;
  padding:9px 11px;border-radius:10px;color:var(--ink-2);font-size:13.5px;font-weight:500}
.nav button:hover{background:var(--panel-2);color:var(--ink)}
.nav button.on{background:var(--accent-soft);color:var(--accent-strong);font-weight:600}
.nav button svg{width:17px;height:17px;flex:0 0 auto;opacity:.9}

 ["Question hook",3,/\?/],
 ["Number / list promise",3,/\b(\d+\s+(things|tips|myths|reasons|mistakes|steps|ways)|top \d+)\b/i],
];
const HOOK_PEN=[
 ["Generic seasonal opener",-10,/\b(is here|is fast approaching|marks the start|brings the promise|perfect time to|as (summer|spring|fall|winter))\b/i],
 ["Real-estate platitude",-8,/\b(owning a home is much more|your home is your haven|more than just a roof|dream home awaits)\b/i],
 ["Global travelogue framing",-8,/\b(find ?home ?anywhere|here or there|your global agent|island (life|living)|la dolce vita)\b/i],
];
function hookComponent(hook,platform){
  let pts=0,det=[];const words=(hook||'').trim().split(/\s+/).filter(Boolean).length;
  for(const[n,v,p]of HOOK_SIG){
    if(p===null){if(words>0&&words<=9&&!(hook||'').includes('#')){const vv=platform==='TikTok'?v+3:v;pts+=vv;det.push([n,vv]);}}
    else if(p.test(hook||'')){pts+=v;det.push([n,v]);}
  }
  for(const[n,v,p]of HOOK_PEN)if(p.test(hook||'')){pts+=v;det.push([n,v]);}
  pts=Math.max(-20,Math.min(26,pts));return[pts,det];
}
const CTA_RE=/(?:[Cc][Oo][Mm][Mm][Ee][Nn][Tt]|[Dd][Mm]|[Mm][Ee][Ss][Ss][Aa][Gg][Ee]|[Dd][Rr][Oo][Pp]|[Tt][Ee][Xx][Tt])[^\n]{0,20}?["'“‘]?([A-Z]{2,12})\b/;
function scoreContent(hook,caption,type,platform){
  platform=platform||'Instagram';const base=PBASE[platform]||PBASE.Instagram;
  type=(type||'reel').toLowerCase();
  if(type==='carousel'&&platform==='TikTok')type='static';
  caption=caption||'';hook=hook||(caption.split('\n')[0]||'');
  const bd=[];
  const tb=(base.type_perf[type]!=null?base.type_perf[type]:50);
  bd.push([platform+' content-type baseline',+(tb-50).toFixed(1),FMTLBL[type]+' averages '+Math.round(tb)+'/100 on '+platform]);
  const theme=classifyTheme(caption||hook);const tp=(base.theme_perf[theme]!=null?base.theme_perf[theme]:50);
  const tadj=Math.max(-12,Math.min(12,(tp-50)*0.6));
  bd.push(['Theme fit',+tadj.toFixed(1),"'"+theme+"' averages "+Math.round(tp)+'/100 on '+platform]);
  const[hp,hd]=hookComponent(hook,platform);
  bd.push(['Hook quality',hp,hd.length?hd.map(x=>x[0]+' ('+(x[1]>0?'+':'')+x[1]+')').join(', '):'no strong signal']);
  const ht=(caption.match(/#\w+/g)||[]).length;let hpt,hn;
  if(platform==='TikTok'){
    if(ht===0){hpt=0;hn='no hashtags — a few (#fyp, local) help TikTok discovery';}
    else if(ht<=8){hpt=3;hn=ht+' hashtags — normal for TikTok';}
    else{hpt=-3;hn=ht+' hashtags — excessive even for TikTok';}
  }else{
    if(ht<=3){hpt=4;hn=ht+' hashtags — disciplined';}
    else if(ht<=6){hpt=0;hn=ht+' hashtags — neutral';}
    else{hpt=-6;hn=ht+' hashtags — over-tagged';}
  }
  bd.push(['Hashtag fit',hpt,hn]);
  const cta=CTA_RE.test(caption);bd.push(['Lead-gen CTA',cta?6:0,cta?'present — drives comments/DMs':"none — add 'Comment/DM/Text WORD'"]);
  const wc=caption.split(/\s+/).filter(Boolean).length;let dp,dn;
  if(platform==='TikTok'){
    if(wc<=20){dp=4;dn=wc+' words — short & punchy (TikTok norm)';}
    else if(wc<=60){dp=1;dn=wc+' words — okay for TikTok';}
    else{dp=-4;dn=wc+' words — too long for TikTok';}
  }else{
    if(wc>=60){dp=4;dn=wc+' words — substantive';}
    else if(wc>=25){dp=1;dn=wc+' words — adequate';}
    else{dp=-3;dn=wc+' words — thin for IG';}
  }
  bd.push(['Caption depth',dp,dn]);
  let raw=50+bd.reduce((a,b)=>a+b[1],0);const score=Math.max(1,Math.min(99,Math.round(raw*10)/10));
  let tier,cls;
  if(score>=70){tier='Top tier — greenlight';cls='good';}
  else if(score>=55){tier='Strong — post it';cls='good';}
  else if(score>=42){tier='Average — strengthen it';cls='warn';}
  else{tier='At risk — rework first';cls='crit';}
  const recs=[];const hookPts=bd[2][1];
  if(hookPts<=0)recs.push('Rewrite the hook as a curiosity gap, POV, or a bold short line.');
  if(!cta)recs.push("Add a one-word CTA (Comment/DM/Text WORD) — lifts comments ~2.3×.");
  if(platform==='TikTok'){if(wc>60)recs.push('Trim the caption — TikTok winners are short; put depth in the video.');}
  else{if(ht>6)recs.push('Cut hashtags to 3 or fewer; IG top posts average ~1.4.');if(wc<25)recs.push('Add story/context — thin captions underperform on IG.');}
  return{score,tier,cls,theme,type,platform,bd,recs};
}

/* ===================== GATE 2 — BRAND ALIGNMENT SCORE =====================
   Built from the locked July 8 2026 Brand Foundation. Five dimensions, 0-20
   each (max 100), plus deterministic hard-rule flags. Transparent heuristics,
   same spirit as the performance model in src/score.py. Estimates you can
   override; the hard-rule flags are absolute. */
const BANNED=["delve","unlock","seamlessly","game-changer","game changer","transformative","cutting-edge","cutting edge","groundbreaking","revolutionary","empower","journey","ecosystem","robust","holistic","synergy","elevate","curate","curated","innovative","dynamic","navigate","landscape"];
const FH_RISK=/\b(perfect for families|family[- ]friendly|great for kids|safe neighborhood|christian|church|no kids|singles?|couples?|retirees|mature|empty[- ]nester|bachelor|ideal for a family|family home)\b/i;
function _cm(low,words){let n=0,hits=[];for(const w of words)if(low.includes(w)){n++;hits.push(w);}return[n,hits];}
function brandScore(hook,caption){
  hook=hook||'';caption=caption||'';
  const raw=hook+'\n'+caption;const t=raw.toLowerCase();
  const dims=[];

  // 1) VOICE MATCH — first-person Diana; hard deductions for third-person / generic-agent
  let v1=6;const n1=[];
  const fp=(t.match(/\b(i|i'm|im|i've|i'll|i'd|my|me|mine)\b/g)||[]).length;
  const tpSelf=/\b(diana (is|will|can|helps|marsh)|she'll help|dianatheatlrealtor|your (trusted )?realtor|our team (is|will)|we (are|will) (here|happy) to help)\b/i.test(raw);
  const broadcast=/\b(contact (me|us) today|call the experts|reach out today|let us help you|book (your|a) (consult|appointment) today)\b/i.test(raw);
  if(fp>=1){v1+=6;n1.push('first-person voice');}
  if(fp>=3)v1+=2;
  if(/\byou(r)?\b/i.test(raw)){v1+=2;n1.push('speaks to the reader');}
  if(tpSelf){v1-=8;n1.push('third-person / generic-agent voice (hard deduction)');}
  if(broadcast){v1-=5;n1.push('brand-broadcast phrasing');}
  if(fp===0&&!tpSelf){v1-=3;n1.push('no clear first-person voice');}
  v1=Math.max(0,Math.min(20,v1));dims.push(['Voice match',v1,20,n1.join(', ')||'neutral']);

  // 2) POWER ADJECTIVES — Warm + Limitless + Intentional (~0-7 each)
  const wn=_cm(t,["love","grateful","heart","family","welcome","hey","care","proud","celebrat","congrat","cup","cozy","warm","kind","joy","thankful"])[0];
  const ln=_cm(t,["possib","what's possible","no limit","anywhere","grow","expand","open door","more","next","options","room to","future","dream","potential","ready"])[0];
  const inn=_cm(t,["strateg","plan","system","on purpose","deliberate","step","framework","checklist","here's how","process","thoughtful","by design","specific","prepared","intentional","playbook","map"])[0];
  const sub=x=>x<=0?0:x===1?3:x===2?5:7;const warm=sub(wn),lim=sub(ln),intent=sub(inn);
  const v2=Math.min(20,warm+lim+intent);
  dims.push(['Power adjectives',v2,20,'Warm '+warm+', Limitless '+lim+', Intentional '+intent+' (of 7 each)']);

  // 3) SUPERPOWER + AND — REALTOR AND Strategist (bonus) OR Real Estate AND Experiences
  const sn=_cm(t,["strateg","marketing","system","data","numbers","comps","pricing","price","negotiat","plan","framework","process","funnel","position","market breakdown","how i","playbook","leverage","timeline","prep","checklist","roi","equity","math","stats","rates"])[0];
  const en=_cm(t,["food","restaurant","coffee","art","museum","travel","neighborhood","local","hidden gem","aviary","walk","park","event","culture","eat","dinner","chef","gallery","community","shop","brunch","patio","mural"])[0];
  let v3,n3;
  if(sn>0){v3=Math.min(20,14+Math.min(6,(sn-1)*2));n3='Strategist edge (REALTOR® and strategist), the prized, hard-to-copy half';}
  else if(en>0){v3=Math.min(16,8+Math.min(4,(en-1)*2));n3='Real estate and experiences (local eye). Solid, but the feed over-indexes this; add a strategist angle to go higher';}
  else{v3=3;n3='No superpower shown, reads generic';}
  dims.push(['Superpower + AND',v3,20,n3]);

  // 4) KIMBERLY TEST — teaches value + speaks to a specific avatar
  let v4=4;const n4=[];
  const teaches=/\b(here'?s what|how to|what nobody tells you|\d+ things|before you|mistake|step|did you know|what to expect|the difference between|why (you|your|it)|guide|breakdown|explain|so you|means for you)\b/i.test(raw);
  const avatar=/\b(first[- ]time|move[- ]up|next home|seller|equity|been in your home|10 (years|yrs)|relocat|moving to atlanta|new to atlanta|teacher|homeowner|thinking (of|about) selling)\b/i.test(raw);
  if(teaches){v4+=8;n4.push('teaches, does not just sell');}
  if(avatar){v4+=8;n4.push('speaks to a specific avatar');}
  if(!teaches&&!avatar)n4.push('no clear avatar or teaching value');
  v4=Math.max(0,Math.min(20,v4));dims.push(['Kimberly test',v4,20,n4.join(', ')]);

  // 5) WARM LUXURY POSITIONING — luxury not cold, not cheap / influencer
  let v5=12;const n5=[];
  const emojis=(raw.match(/\p{Extended_Pictographic}/gu)||[]).length;
  const bangs=(raw.match(/!/g)||[]).length;
  const capsHype=/\b(OMG|WOW|HUGE|INSANE|CRAZY|ASAP|LINK IN BIO|HURRY|BLOWING UP)\b/.test(raw);
  const qual=_cm(t,["quality","considered","refined","standard","detail","craft","thoughtful","elevated","timeless","calm","ease","luxury with a pulse"])[0];
  if(qual>0){v5+=Math.min(5,qual*2);n5.push('quality / warmth cues');}
  if(emojis>3){v5-=5;n5.push(emojis+' emojis (reads influencer)');}
  if(bangs>=3){v5-=4;n5.push(bangs+' exclamation marks (reads hype)');}
  if(capsHype){v5-=5;n5.push('all-caps hype (reads cheap)');}
  v5=Math.max(0,Math.min(20,v5));dims.push(['Warm luxury',v5,20,n5.join(', ')||'holds a neutral standard']);

  const total=dims.reduce((a,d)=>a+d[1],0);let band,cls;
  if(total>=80){band='Sharp, priority';cls='good';}
  else if(total>=60){band='Solid, tighten it';cls='good';}
  else if(total>=40){band='Off-brand drift, rework';cls='warn';}
  else{band='Any agent could post this, do not post';cls='crit';}

  // ---- deterministic hard-rule flags (absolute) ----
  const flags=[];
  const fb=BANNED.filter(w=>w!=='leverage'&&t.includes(w));
  flags.push(fb.length?{s:'fail',l:'Banned words',d:fb.join(', ')}:{s:'pass',l:'Banned words',d:'none'});
  const hasEm=/[—–]/.test(raw);const hasDash=/\s-\s/.test(raw);
  flags.push((hasEm||hasDash)?{s:'fail',l:'Dashes',d:hasEm?'em / en dash present':'spaced hyphen used as a dash'}:{s:'pass',l:'No dashes',d:'clean'});
  const rBad=/\bREALTOR\b(?!®)/.test(raw);const fBad=/\bForever Agent\b(?!®)/.test(raw);
  flags.push((rBad||fBad)?{s:'fail',l:'® symbol',d:((rBad?'REALTOR needs ®. ':'')+(fBad?'Forever Agent needs ®.':'')).trim()}:{s:'pass',l:'® symbol',d:'ok'});
  flags.push(FH_RISK.test(raw)?{s:'warn',l:'Fair Housing',d:'possible protected-class language. Market the situation, not who lives there'}:{s:'pass',l:'Fair Housing',d:'clear'});
  const hw=hook.trim().split(/\s+/).filter(Boolean).length;
  flags.push((hw>0&&hw<=9)?{s:'pass',l:'Hook length',d:hw+' words (under 9)'}:{s:hw===0?'warn':'fail',l:'Hook length',d:hw===0?'no hook line given':hw+' words (aim under 9)'});
  if(/\bclhms\b/i.test(raw))flags.push({s:'fail',l:'CLHMS',d:'designation not held, remove it'});
  if(/\bdelta\b/i.test(raw)||/✈/.test(raw))flags.push({s:'fail',l:'Delta / airplane',d:'never reference in client-facing content'});

  const hardFail=flags.some(f=>f.s==='fail');
  return{total,band,cls,dims,flags,hardFail};
}


/* ---------- render helpers ---------- */
function bar(label,val,max,color,dim){
  const w=Math.max(2,Math.min(100,val/max*100));
  return '<div class="bar'+(dim?' dim':'')+'"><div class="bl">'+label+'</div>'
   +'<div class="track"><div class="fill" style="width:'+w+'%;background:'+(color||'var(--accent)')+'"></div></div>'
   +'<div class="bv">'+val+'</div></div>';
}
function donut(segs,center,sub){
  const R=52,C=2*Math.PI*R;let off=0;const tot=segs.reduce((a,s)=>a+s.v,0)||1;
  let circ='';segs.forEach(s=>{const len=s.v/tot*C;
    circ+='<circle cx="60" cy="60" r="'+R+'" fill="none" stroke="'+s.c+'" stroke-width="15" '
      +'stroke-dasharray="'+(len-3)+' '+(C-len+3)+'" stroke-dashoffset="'+(-off)+'" stroke-linecap="round"/>';off+=len;});
  return '<div class="donut"><svg viewBox="0 0 120 120" style="transform:rotate(-90deg)">'
    +'<circle cx="60" cy="60" r="'+R+'" fill="none" stroke="var(--inset)" stroke-width="15"/>'+circ+'</svg>'
    +'<div class="ctr"><b>'+center+'</b><span>'+sub+'</span></div></div>';
}
function fmtPill(t){return '<span class="pill '+t+'"><span class="swatch" style="background:'+FMT[t]+'"></span>'+FMTLBL[t]+'</span>';}
function scoreColor(s){return s>=70?'var(--good)':s>=55?'var(--accent)':s>=42?'var(--warn)':'var(--crit)';}
function scoreBg(s){return s>=70?'var(--good-soft)':s>=55?'var(--accent-soft)':s>=42?'var(--warn-soft)':'var(--crit-soft)';}
function brandColor(s){return s>=80?'var(--good)':s>=60?'var(--accent)':s>=40?'var(--warn)':'var(--crit)';}
function brandBg(s){return s>=80?'var(--good-soft)':s>=60?'var(--accent-soft)':s>=40?'var(--warn-soft)':'var(--crit-soft)';}

async function refreshLive(loud){
  const badge=document.getElementById('liveBadge');
  if(loud&&badge)badge.innerHTML='<span class="mini">Connecting…</span>';
  try{
    const r=await fetch('/api/drafts',{cache:'no-store'}); const j=await r.json();
    if(!j.configured){LIVE=false;renderIdeas();return;}
    if(j.error)throw new Error(j.error);
    const off=t=>/flight attendant|delta|started everywhere else/i.test(t);
    const meta=t=>/i appreciate/i.test(t)&&/(clarif|brief|flag|reaching out|i need)/i.test(t);
    const map={};
    const workable=s=>!s||['Draft','Pending Review','Needs Revision'].includes(s);
    (j.drafts||[]).forEach(d=>{const t=(d.hook||'')+' '+(d.caption||''); if(!d.caption||meta(t)||!workable(d.status))return;
      const plat=/tiktok/i.test(d.platform||'')?'TikTok':'Instagram';
      const res=scoreContent(d.hook||d.caption.slice(0,60), d.caption, 'reel', plat);
      const key=(d.hook||d.caption).toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,40);
      const rec={h:(d.hook||d.caption.slice(0,80)).slice(0,120),c:d.caption,p:plat,s:res.score,t:res.tier,
        th:res.detected_theme,ob:off(t),tr:d.trigger||'',nm:d.name||'',pageId:d.pageId};
      if(!map[key]||rec.s>map[key].s)map[key]=rec;});
    IDEAS=Object.values(map).sort((a,b)=>b.s-a.s); LIVE=true; renderIdeas();
    const f=document.getElementById('ideaFoot');
    if(f)f.innerHTML='Live from your NOVA Content Queue · off-brand flagged, non-content filtered.';
  }catch(e){LIVE=false;renderIdeas();
    const f=document.getElementById('ideaFoot'); if(f&&loud)f.textContent='Could not reach Notion: '+e.message;}
}

  if(t.includes('realtor'))c='REALTOR®';
  else if(t.includes('entrepreneur'))c='Entrepreneur';
  else if(t.includes('curator')||t.includes('luxury')||t.includes('experience'))c='Soft Luxury Experience Curator';
  else if(t.includes('atlanta')||t.includes('native')||t.includes('local'))c='Atlanta Native';
  if(c&&out.indexOf(c)<0)out.push(c);});return out;}
function mxCanonJob(s){const t=(s||'').toLowerCase();
  if(t.includes('entertain'))return 'Entertain';
  if(t.includes('educat'))return 'Educate';
  if(t.includes('encourag'))return 'Encourage';return '';}
function mxCellItems(ch,jb){return window.MX.items.filter(r=>{
  const cs=mxCanonChars(r.character),j=mxCanonJob(r.job);
  return cs.indexOf(ch)>=0&&j===jb&&(!window.MX.series||r.series===window.MX.series);});}

function mxTiles(){
  const M=window.MX, live=M.configured&&M.items.length;
  let tagged=0; const seen=new Set();
  if(live)M.items.forEach(r=>{const cs=mxCanonChars(r.character),j=mxCanonJob(r.job);
    if(cs.length&&j){tagged++;cs.forEach(c=>seen.add(c+'|'+j));}});
  return `
    <div class="card stat"><div class="tilehead"><div><div class="lab">Matrix cells</div><div class="big">12</div></div><div class="tile-ico">${ICO.matrix}</div></div><div class="meta">4 characters × 3 jobs</div></div>
    <div class="card stat"><div class="tilehead"><div><div class="lab">Strategically thin</div><div class="big" style="color:var(--crit)">4</div></div><div class="tile-ico">${ICO.spark}</div></div><div class="meta">under-served by design — prioritize</div></div>
    <div class="card stat"><div class="tilehead"><div><div class="lab">Tagged items</div><div class="big">${live?tagged:'—'}</div></div><div class="tile-ico">${ICO.tag}</div></div><div class="meta">${live?'tagged in NOVA Content Queue':'awaiting live data'}</div></div>
    <div class="card stat"><div class="tilehead"><div><div class="lab">Coverage</div><div class="big">${live?seen.size+'/12':'—'}</div></div><div class="tile-ico">${ICO.grid}</div></div><div class="meta">${live?'cells with ≥1 item':'activates once tagged'}</div></div>`;
}

function mxRenderGrid(){
  const grid=document.getElementById('mxGrid'); if(!grid)return;
  const M=window.MX, live=M.configured&&M.items.length;
  let h='<div class="mxrow mxhead"><div></div>'+MXJOBS.map(j=>`<div>${j}</div>`).join('')+'</div>';
  MXCHARS.forEach(ch=>{
    h+=`<div class="mxrow"><div class="mxlbl">${MXSHORT[ch]}</div>`;
    MXJOBS.forEach(jb=>{const thin=MXTHIN(ch,jb);
      if(live){const n=mxCellItems(ch,jb).length;const cls=n===0?'starved':n<=2?'thin':'ok';
        h+=`<button class="mxcell ${cls}" data-c="${esc(ch)}" data-j="${jb}"><b>${n}</b>${thin?'<span class="mxstar">focus</span>':''}</button>`;}
      else{h+=`<div class="mxcell ${thin?'starved':''}" style="cursor:default"><b>—</b>${thin?'<span class="mxstar">thin</span>':''}</div>`;}
    });
    h+='</div>';});
  grid.innerHTML=h;
  if(live)grid.querySelectorAll('.mxcell').forEach(b=>b.addEventListener('click',()=>mxShowCell(b.dataset.c,b.dataset.j)));
}

function mxShowCell(ch,jb){
  const items=mxCellItems(ch,jb),el=document.getElementById('mxDrill'); if(!el)return;
  const chip=d=>d?`<span class="pill ${d==='Keep'?'good':/off-brand/i.test(d)?'crit':'warn'}">${esc(d)}</span>`:'';
  el.innerHTML=`<h3>${MXSHORT[ch]} × ${jb} &nbsp;<span class="mini">${items.length} idea${items.length===1?'':'s'}</span></h3>`+
    (items.length?'<div class="mxlist" style="margin-top:8px">'+items.map(r=>`<div class="lrow"><span class="nm">${esc(r.name||r.hook||'(untitled)')}</span><span class="d">${esc(r.status||'')}${r.series&&r.series!=='General'?' · '+esc(r.series):''}</span>${chip(r.disposition)}</div>`).join('')+'</div>'
    :`<p class="cap" style="margin-top:8px">Empty cell — a create-fresh slot. ${MXTHIN(ch,jb)?'Strategy flags this as a priority gap to fill.':'No ideas tagged here yet.'}</p>`);
}

async function loadMatrix(){
  let items=[],configured=false;
  try{const r=await fetch('/api/drafts',{cache:'no-store'});const j=await r.json();
    if(j.configured&&!j.error){configured=true;items=j.drafts||[];}}catch(e){}
  window.MX={loaded:true,configured,items,series:''};
  const tiles=document.getElementById('mxTiles'); if(tiles)tiles.innerHTML=mxTiles();
  const badge=document.getElementById('mxBadge');
  if(badge)badge.innerHTML=configured&&items.length?'<span class="pill good">live from NOVA</span>'
    :configured?'<span class="pill warn">no tagged items yet</span>':'<span class="pill warn">connect Notion to populate</span>';
  const ser=[...new Set(items.map(r=>r.series).filter(s=>s&&s!=='General'))].sort();
  const sel=document.getElementById('mxSeries');
  if(sel){ser.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
    sel.onchange=()=>{window.MX.series=sel.value;mxRenderGrid();const d=document.getElementById('mxDrill');if(d)d.innerHTML='<p class="cap">Pick a cell above to see its ideas.</p>';};}
  mxRenderGrid();
}

function viewMatrix(){
  return `
  <div class="grid g4" id="mxTiles">${mxTiles()}</div>
  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px">
      <p class="eyebrow" style="margin:0">Character × Job coverage — live from NOVA</p>
      <span id="mxBadge"></span>
    </div>
    <p class="cap" style="margin:8px 0 0">Every tagged idea in your Content Queue, mapped to character × job. Red cells are starved; <b>focus</b> marks the brand-strategy priority gaps (Entrepreneur column + Curator × Educate). Click a cell to see its ideas.</p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0 2px">
      <label class="mini">Series / lane</label>
      <select class="ti" id="mxSeries" style="max-width:240px;margin:0"><option value="">All series / lanes</option></select>
    </div>
    <div id="mxGrid" class="mx"></div>
    <div class="callout crit" style="margin-top:16px"><b>Thin cells</b> are a deliberate brand-strategy gap, not a measured stat: the entire <b>Entrepreneur</b> column and <b>Curator × Educate</b> are flagged to fill. Counts are tallied live from Character + Job tags — until posts are tagged, cells read <b>"—"</b> and no coverage is fabricated.</div>
  </div>
  <div class="card" id="mxDrill" style="margin-top:16px"><p class="cap">Pick a cell above to see its ideas.</p></div>`;
}

/* ===================== ENGAGEMENT TARGETS =====================
   Working benchmarks (UNVERIFIED — not industry fact). Live progress bars stay
   in an "awaiting live data" state until a real-time analytics feed is wired
   in (Phase 2). The last Metricool weekly snapshot is shown only as a gray
   reference where it genuinely exists — never presented as live tracking. */
function viewTargets(){
  const snap=(X.summary||{});
  const pct=v=>(v==null?null:+(v*100).toFixed(1));
  const live=(window.LIVECFG&&window.LIVECFG.targets)||null;
  const FALL=[
    {p:'TikTok',lo:3,hi:9},{p:'Instagram',lo:4,hi:4},{p:'LinkedIn',lo:2,hi:2},
  ];
  const src=live?live.map(t=>({p:t.platform,lo:t.lo,hi:(t.hi==null?t.lo:t.hi)})):FALL;
  const rows=src.map(t=>({...t,ref:pct(snap[t.p]&&snap[t.p].avg_engagement_rate)}));
  const cards=rows.map(r=>{
    const tgt=r.lo===r.hi?r.lo+'%':r.lo+'–'+r.hi+'%';
    const refline=r.ref!=null
      ? `<div class="mini" style="margin-top:8px">Last Metricool snapshot (weekly, not live): <b style="color:var(--ink-2)">${r.ref}%</b></div>`
      : `<div class="mini" style="margin-top:8px">No engagement data yet — <b>awaiting live data</b></div>`;
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <b style="font-size:14px">${r.p}</b><span class="pill warn" style="font-size:10px">TARGET ${tgt}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px">
        <span>Live progress</span><span>awaiting live data</span>
      </div>
      <div style="height:12px;border-radius:8px;background:var(--inset);position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 6px,color-mix(in srgb,var(--muted) 22%,transparent) 6px,color-mix(in srgb,var(--muted) 22%,transparent) 12px)"></div>
      </div>
      ${refline}
    </div>`;
  }).join('');
  const banner=live
    ? `<div class="callout good" style="margin-bottom:16px"><b>Targets sourced live from NOVA (Notion).</b> These are your own benchmarks, edited in the Engagement Targets database — this dashboard reads them, it does not invent them. Live progress bars stay empty ("awaiting live data") until a real-time engagement feed is connected; the gray reference is the last weekly Metricool snapshot.</div>`
    : `<div class="callout crit" style="margin-bottom:16px"><b>These targets are working benchmarks — unverified, not industry fact.</b> They're placeholders to align against, not validated standards, and NOVA isn't wired to this view yet (showing fallback values). Live progress bars stay empty ("awaiting live data") until a real-time analytics feed is connected.</div>`;
  return `
  ${banner}
  <div class="grid g3">${cards}</div>
  <div class="card" style="margin-top:16px">
    <p class="eyebrow">How these read</p>
    <p class="lead"><b>Target</b> is the engagement-rate benchmark to aim for on each platform. <b>Live progress</b> is intentionally blank — this view does not yet read a live analytics feed, so it will not invent a number. Where a real <b>Metricool weekly snapshot</b> exists it's shown in gray as a reference point only, clearly not live tracking. Wiring a real-time source (Phase 2) is what turns these bars on.</p>
  </div>`;
}

/* ===================== SOPs (read-only, live from NOVA) ===================== */
function viewSops(){
  const sops=(window.LIVECFG&&window.LIVECFG.sops)||null;
  if(!sops||!sops.length){
    return `<div class="card">
      <p class="eyebrow">Standard operating procedures</p>
      <p class="lead">This view reads your <b>SOPs</b> straight from NOVA (Notion) so the playbook lives in one place. It's <b>awaiting live data</b> — connect the SOPs database (set <code>NOTION_SOPS_DB</code> in Vercel; steps in SETUP_LIVE.md) and your procedures appear here automatically. Nothing is invented in the meantime.</p>
    </div>`;
  }
  const cards=sops.map(s=>`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px">
      <b style="font-size:14px">${esc(s.title)}</b>${s.trigger?`<span class="pill warn" style="font-size:10px">${esc(s.trigger)}</span>`:''}
    </div>
    ${s.body?`<p class="lead" style="white-space:pre-wrap">${esc(s.body)}</p>`:'<p class="mini">No body text.</p>'}
  </div>`).join('');
  return `<div class="callout good" style="margin-bottom:16px"><b>Live from NOVA (Notion).</b> ${sops.length} SOP${sops.length===1?'':'s'} — read-only. Edit in Notion; this view reflects it within ~60s.</div>
    <div class="grid" style="gap:14px">${cards}</div>`;
}

/* ---------- app wiring ---------- */
const VIEWS={overview:['Overview',"What's working across 133 posts",viewOverview],
  formats:['Formats','Reels reach, carousels engage, static trails',viewFormats],
  themes:['Themes','Which topics earn attention — and which to cut',viewThemes],
  hooks:['Hooks','The openers that stop the scroll',viewHooks],
  cadence:['Cadence','When to post for reach and resonance',viewCadence],
  leaderboard:['Leaderboard','The 10 best and 10 worst posts',viewLeaderboard],
  platforms:['Platforms','Instagram vs TikTok — and where the rest stand',viewPlatforms],
  matrix:['Content Matrix','4 characters × 3 jobs — where coverage is thin',viewMatrix],
  targets:['Engagement Targets','Benchmarks to aim for — live tracking pending',viewTargets],
  sops:['SOPs','Your playbook — live from NOVA',viewSops],
  score:['Score a Draft','Predict performance before you produce',viewScore]};
const wrap=document.getElementById('wrap');
function show(v){
  const[t,s,fn]=VIEWS[v];
  document.getElementById('ptitle').textContent=t;
  document.getElementById('psub').textContent=s;
  wrap.innerHTML='<div class="view on">'+fn()+'</div>';
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  if(v==='score'){
    document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
      document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderScore();});
    document.getElementById('platseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
      document.querySelectorAll('#platseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderScore();});
    document.getElementById('hk').addEventListener('input',renderScore);
    document.getElementById('cp').addEventListener('input',renderScore);
    document.getElementById('sendBtn').addEventListener('click',sendToNova);
    document.getElementById('wrap').addEventListener('click',e=>{if(e.target.id==='refreshLive'){e.preventDefault();refreshLive(true);}});
    renderIdeas();      // wires idea clicks + live badge
    loadIdea(0);        // preload top idea
    refreshLive(false); // try to pull live drafts from Notion (silent if not configured)
  }
  if(v==='matrix'){mxRenderGrid();loadMatrix();}   // live coverage from NOVA Content Queue
  document.getElementById('side').classList.remove('open');
  var _sc=document.getElementById('scrim'); if(_sc)_sc.classList.remove('on');
  window.scrollTo({top:0,behavior:'instant'in document.body.style?'instant':'auto'});
}
document.querySelectorAll('#nav button').forEach(b=>b.insertAdjacentHTML('afterbegin',ICO[b.dataset.ico]||''));
document.getElementById('menu').innerHTML=ICO.menu;
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)show(b.dataset.v);});

/* mobile menu: open/close with scrim + Escape + tap-away */
const side=document.getElementById('side'), scrim=document.getElementById('scrim');
function setMenu(open){side.classList.toggle('open',open);scrim.classList.toggle('on',open);}
window.closeMenu=()=>setMenu(false);
document.getElementById('menu').addEventListener('click',()=>setMenu(!side.classList.contains('open')));
scrim.addEventListener('click',()=>setMenu(false));
document.addEventListener('keydown',e=>{if(e.key==='Escape')setMenu(false);});

/* theme toggle — defaults to light, remembers the visitor's choice */
const tgl=document.getElementById('tgl');
function readSaved(){try{return localStorage.getItem('dm-theme');}catch(e){return null;}}
function saveTheme(t){try{localStorage.setItem('dm-theme',t);}catch(e){}}
function curTheme(){return document.documentElement.getAttribute('data-theme')||'light';}
function setTgl(){tgl.innerHTML=curTheme()==='dark'?ICO.sun:ICO.moon||ICO.sun;}
ICO.moon=icon('<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>');
tgl.addEventListener('click',()=>{const n=curTheme()==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);saveTheme(n);setTgl();});
document.documentElement.setAttribute('data-theme', readSaved()||'light');   // light by default
setTgl();
show('overview');

/* Phase 2 — pull live config (targets / matrix / SOPs) from NOVA. Falls back
   silently to baked-in values if /api/config isn't configured or is offline.
   Re-renders only the live views if one is open when the data arrives. */
window.LIVECFG=null;
fetch('/api/config',{cache:'no-store'}).then(r=>r.json()).then(j=>{
  if(!j||!j.configured)return;
  window.LIVECFG=j;
  const cur=document.querySelector('#nav button.on');
  if(cur&&['targets','sops'].includes(cur.dataset.v))show(cur.dataset.v);
}).catch(()=>{});
</script>
