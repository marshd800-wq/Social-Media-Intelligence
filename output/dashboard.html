*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;}
a{color:inherit}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

/* Shell */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;gap:6px;padding:20px 14px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
.brand .mark{width:32px;height:32px;border-radius:9px;flex:0 0 auto;
  background:linear-gradient(150deg,var(--accent),var(--accent-strong));
  display:grid;place-items:center;box-shadow:0 4px 10px -4px var(--accent)}
.brand .mark svg{width:18px;height:18px}
.brand b{font-size:14.5px;letter-spacing:-.01em;display:block;line-height:1.15}
.brand span{font-size:11px;color:var(--muted);letter-spacing:.03em}
.nav{display:flex;flex-direction:column;gap:2px}
.navlabel{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);padding:12px 10px 6px}
.nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;
  padding:9px 11px;border-radius:10px;color:var(--ink-2);font-size:13.5px;font-weight:500}
.nav button:hover{background:var(--panel-2);color:var(--ink)}
.nav button.on{background:var(--accent-soft);color:var(--accent-strong);font-weight:600}
.nav button svg{width:17px;height:17px;flex:0 0 auto;opacity:.9}
.nav button.on svg{color:var(--accent)}
.side .foot{margin-top:auto;padding:14px;border-radius:12px;background:var(--panel-2);
  border:1px solid var(--line)}
.side .foot p{margin:0;font-size:11.5px;color:var(--ink-2)}
.side .foot .k{color:var(--muted)}

/* Main */
.main{min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--bg) 84%,transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:16px 26px}
.top h1{font-size:18px;margin:0;letter-spacing:-.02em;text-wrap:balance}
.top .sub{font-size:12px;color:var(--muted);margin-top:2px}
.chips{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{font-size:11.5px;color:var(--ink-2);background:var(--panel);border:1px solid var(--line);
  padding:5px 10px;border-radius:999px;display:inline-flex;gap:6px;align-items:center}
.chip .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.tgl{all:unset;cursor:pointer;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const FMT = {reel:'var(--reel)',carousel:'var(--carousel)',static:'var(--static)'};
const FMTLBL = {reel:'Reel',carousel:'Carousel',static:'Static'};
const nf = n => n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'k' : Math.round(n).toString();
const esc = s => s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- scoring model (platform-aware port of src/score.py) ---------- */
const PBASE = JSON.parse(document.getElementById('pbase').textContent);
const THEME_KW = {
 "Find Home Anywhere (global series)":["findhomeanywhere","here or there","canada","bahamas","cayman","uae","dubai","italy","portugal","spain","mexico","aruba","uk ","island","paradise","global agent","yourglobalagent","tuscan","abroad"],
 "Seller / move-up equity":["sell","selling","seller","listing","list your","equity","your net","home value","zestimate","move up","move-up","moved up","been in your home","next chapter","outgrew","downsize","staging","stage","market-ready","list it"],
 "Buyer / first-time / financing":["buyer","buying","buy a home","pre-approved","preapproved","pre-approval","first-time","first time","down payment","mortgage","interest rate","lower interest","qualify","seller credits","down payment assistance","lender","203k","homebuying","home buying","afford","rent"],
 "Listing / deal of the day / home tour":["deal of the day","beds","baths","sqft","sq ft","square feet","open house","new construction","coming soon","modern farmhouse","pop-up alert","just listed","home tour","primary suite","kitchenette","corner lot"],
 "Relocation to Atlanta":["relocate","relocating","moving to atlanta","job offer","new city","make atlanta home","relocation","from another market","barely visited"],
 "Market stats / education":["market","rates","stats","appreciation","trends","myth","tax","interest rate","data","numbers","% off","neighborhoods","equity growth","inspection","remodeling","renovation"],
 "Lifestyle / seasonal / home tips":["thanksgiving","turkey","hosting","host","coffee table","styling","style your","winter","cozy","holiday","decor","recipe","guests","harsh weather","spiced","fall ","season","home ready","warm you up","treat"],
 "Personal / behind the scenes":["i love","my mom","my job","love my job","behind the scenes","pov","describe your job","closing day","cold call","why i","fills my cup","melted my heart","adopt a teacher","mindset","mental health","personal","shocked","my name","two things","always have my focus","sharpening my skills","trust the process","growth happens","grateful"],
 "Humor / relatable":["illegal","sound illegal","piggy bank","y'all think","lunchmoney","humor","did you know","opens piggy bank"],
};
function classifyTheme(text){
  const low=(text||'').toLowerCase(); let best='Uncategorized',bestN=0;
  for(const th in THEME_KW){let n=0;for(const kw of THEME_KW[th])if(low.includes(kw))n++;
    if(n>bestN){bestN=n;best=th;}}
  return best;
}
const HOOK_SIG=[
 ["Curiosity / open loop",8,/\b(the .* part|nobody (tells|says)|what .* looks like|here'?s (why|what|the)|the (secret|truth|#?1)|do not|don'?t make a move|until you read)\b/i],
 ["POV / relatable framing",7,/\b(pov|describe your job|how it'?s going|when you|that feeling|imagine)\b/i],
 ["Bold, punchy one-liner",6,null],
 ["Local specificity",6,/\b(metro atlanta|cobb|fulton|marietta|kennesaw|smyrna|atlanta|fairburn|dekalb)\b/i],
 ["Calls out a segment",5,/(teachers|first[- ]time|move[- ]up|sellers?|buyers?|relocating|been in your home|self-?employed)\b/i],
 ["Personal story opener",5,/\b(nothing brings me|my mom|i love|not one cold call|grateful|childhood|congratulations)\b/i],
 ["Question hook",3,/\?/],
 ["Number / list promise",3,/\b(\d+\s+(things|tips|myths|reasons|mistakes|steps|ways)|top \d+)\b/i],
];
const HOOK_PEN=[
 ["Generic seasonal opener",-10,/\b(is here|is fast approaching|marks the start|brings the promise|perfect time to|as (summer|spring|fall|winter))\b/i],
 ["Real-estate platitude",-8,/\b(owning a home is much more|your home is your haven|more than just a roof|dream home awaits)\b/i],
 ["Global travelogue framing",-8,/\b(find ?home ?anywhere|here or there|your global agent|island (life|living)|la dolce vita)\b/i],
];
function hookComponent(hook,platform){
  let pts=0,det=[];const words=(hook||'').trim().split(/\s+/).filter(Boolean).length;
  for(const[n,v,p]of HOOK_SIG){
    if(p===null){if(words>0&&words<=9&&!(hook||'').includes('#')){const vv=platform==='TikTok'?v+3:v;pts+=vv;det.push([n,vv]);}}
    else if(p.test(hook||'')){pts+=v;det.push([n,v]);}
  }
  for(const[n,v,p]of HOOK_PEN)if(p.test(hook||'')){pts+=v;det.push([n,v]);}
  pts=Math.max(-20,Math.min(26,pts));return[pts,det];
}
const CTA_RE=/(?:[Cc][Oo][Mm][Mm][Ee][Nn][Tt]|[Dd][Mm]|[Mm][Ee][Ss][Ss][Aa][Gg][Ee]|[Dd][Rr][Oo][Pp]|[Tt][Ee][Xx][Tt])[^\n]{0,20}?["'“‘]?([A-Z]{2,12})\b/;
function scoreContent(hook,caption,type,platform){
  platform=platform||'Instagram';const base=PBASE[platform]||PBASE.Instagram;
  type=(type||'reel').toLowerCase();
  if(type==='carousel'&&platform==='TikTok')type='static';
  caption=caption||'';hook=hook||(caption.split('\n')[0]||'');
  const bd=[];
  const tb=(base.type_perf[type]!=null?base.type_perf[type]:50);
  bd.push([platform+' content-type baseline',+(tb-50).toFixed(1),FMTLBL[type]+' averages '+Math.round(tb)+'/100 on '+platform]);
  const theme=classifyTheme(caption||hook);const tp=(base.theme_perf[theme]!=null?base.theme_perf[theme]:50);
  const tadj=Math.max(-12,Math.min(12,(tp-50)*0.6));
  bd.push(['Theme fit',+tadj.toFixed(1),"'"+theme+"' averages "+Math.round(tp)+'/100 on '+platform]);
  const[hp,hd]=hookComponent(hook,platform);
  bd.push(['Hook quality',hp,hd.length?hd.map(x=>x[0]+' ('+(x[1]>0?'+':'')+x[1]+')').join(', '):'no strong signal']);
  const ht=(caption.match(/#\w+/g)||[]).length;let hpt,hn;
  if(platform==='TikTok'){
    if(ht===0){hpt=0;hn='no hashtags — a few (#fyp, local) help TikTok discovery';}
    else if(ht<=8){hpt=3;hn=ht+' hashtags — normal for TikTok';}
    else{hpt=-3;hn=ht+' hashtags — excessive even for TikTok';}
  }else{
    if(ht<=3){hpt=4;hn=ht+' hashtags — disciplined';}
    else if(ht<=6){hpt=0;hn=ht+' hashtags — neutral';}
    else{hpt=-6;hn=ht+' hashtags — over-tagged';}
  }
  bd.push(['Hashtag fit',hpt,hn]);
  const cta=CTA_RE.test(caption);bd.push(['Lead-gen CTA',cta?6:0,cta?'present — drives comments/DMs':"none — add 'Comment/DM/Text WORD'"]);
  const wc=caption.split(/\s+/).filter(Boolean).length;let dp,dn;
  if(platform==='TikTok'){
    if(wc<=20){dp=4;dn=wc+' words — short & punchy (TikTok norm)';}
    else if(wc<=60){dp=1;dn=wc+' words — okay for TikTok';}
    else{dp=-4;dn=wc+' words — too long for TikTok';}
  }else{
    if(wc>=60){dp=4;dn=wc+' words — substantive';}
    else if(wc>=25){dp=1;dn=wc+' words — adequate';}
    else{dp=-3;dn=wc+' words — thin for IG';}
  }
  bd.push(['Caption depth',dp,dn]);
  let raw=50+bd.reduce((a,b)=>a+b[1],0);const score=Math.max(1,Math.min(99,Math.round(raw*10)/10));
  let tier,cls;
  if(score>=70){tier='Top tier — greenlight';cls='good';}
  else if(score>=55){tier='Strong — post it';cls='good';}
  else if(score>=42){tier='Average — strengthen it';cls='warn';}
  else{tier='At risk — rework first';cls='crit';}
  const recs=[];const hookPts=bd[2][1];
  if(hookPts<=0)recs.push('Rewrite the hook as a curiosity gap, POV, or a bold short line.');
  if(!cta)recs.push("Add a one-word CTA (Comment/DM/Text WORD) — lifts comments ~2.3×.");
  if(platform==='TikTok'){if(wc>60)recs.push('Trim the caption — TikTok winners are short; put depth in the video.');}
  else{if(ht>6)recs.push('Cut hashtags to 3 or fewer; IG top posts average ~1.4.');if(wc<25)recs.push('Add story/context — thin captions underperform on IG.');}
  return{score,tier,cls,theme,type,platform,bd,recs};
}

/* ---------- render helpers ---------- */
function bar(label,val,max,color,dim){
  const w=Math.max(2,Math.min(100,val/max*100));
  return '<div class="bar'+(dim?' dim':'')+'"><div class="bl">'+label+'</div>'
   +'<div class="track"><div class="fill" style="width:'+w+'%;background:'+(color||'var(--accent)')+'"></div></div>'
   +'<div class="bv">'+val+'</div></div>';
}
function donut(segs,center,sub){
  const R=52,C=2*Math.PI*R;let off=0;const tot=segs.reduce((a,s)=>a+s.v,0)||1;
  let circ='';segs.forEach(s=>{const len=s.v/tot*C;
    circ+='<circle cx="60" cy="60" r="'+R+'" fill="none" stroke="'+s.c+'" stroke-width="15" '
      +'stroke-dasharray="'+(len-3)+' '+(C-len+3)+'" stroke-dashoffset="'+(-off)+'" stroke-linecap="round"/>';off+=len;});
  return '<div class="donut"><svg viewBox="0 0 120 120" style="transform:rotate(-90deg)">'
    +'<circle cx="60" cy="60" r="'+R+'" fill="none" stroke="var(--inset)" stroke-width="15"/>'+circ+'</svg>'
    +'<div class="ctr"><b>'+center+'</b><span>'+sub+'</span></div></div>';
}
function fmtPill(t){return '<span class="pill '+t+'"><span class="swatch" style="background:'+FMT[t]+'"></span>'+FMTLBL[t]+'</span>';}
function scoreColor(s){return s>=70?'var(--good)':s>=55?'var(--accent)':s>=42?'var(--warn)':'var(--crit)';}
function scoreBg(s){return s>=70?'var(--good-soft)':s>=55?'var(--accent-soft)':s>=42?'var(--warn-soft)':'var(--crit-soft)';}

  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  if(v==='score'){
    document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
      document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderScore();});
    document.getElementById('platseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
      document.querySelectorAll('#platseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderScore();});
    document.getElementById('hk').addEventListener('input',renderScore);
    document.getElementById('cp').addEventListener('input',renderScore);
    document.getElementById('hk').value='The job offer was the easy part.';
    document.getElementById('cp').value="The job offer was the easy part. Now you're staring at a map of a city you've barely visited. This is the part I do every week — I help people relocate to Metro Atlanta. Comment ATLANTA and I'll take it from there.";
    renderScore();
  }
  document.getElementById('side').classList.remove('open');
  window.scrollTo({top:0,behavior:'instant'in document.body.style?'instant':'auto'});
}
document.querySelectorAll('#nav button').forEach(b=>b.insertAdjacentHTML('afterbegin',ICO[b.dataset.ico]||''));
document.getElementById('menu').innerHTML=ICO.menu;
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)show(b.dataset.v);});
document.getElementById('menu').addEventListener('click',()=>document.getElementById('side').classList.toggle('open'));

/* theme toggle */
const tgl=document.getElementById('tgl');
function curTheme(){const r=document.documentElement.getAttribute('data-theme');
  if(r)return r;return matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
function setTgl(){tgl.innerHTML=curTheme()==='dark'?ICO.sun:ICO.moon||ICO.sun;}
ICO.moon=icon('<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>');
tgl.addEventListener('click',()=>{const n=curTheme()==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);setTgl();});
setTgl();
show('overview');
</script>
